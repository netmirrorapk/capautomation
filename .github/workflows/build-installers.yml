name: Build Installers

# Run manually from the Actions tab, or automatically when you push a version tag.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  macos:
    name: macOS (.dmg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Build macOS installer
        run: npm run dist:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Upload .dmg
        uses: actions/upload-artifact@v4
        with:
          name: CapCut-Subtitle-Editor-macOS
          path: dist/*.dmg
          if-no-files-found: error

  windows:
    name: Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Build Windows installer
        run: npm run dist:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Upload .exe
        uses: actions/upload-artifact@v4
        with:
          name: CapCut-Subtitle-Editor-Windows
          path: dist/*.exe
          if-no-files-found: error
