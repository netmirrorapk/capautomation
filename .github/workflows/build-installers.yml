name: Build installers

# Builds the one-click installers for Windows (.exe / NSIS) and macOS (.dmg)
# on their native runners. Trigger manually from the Actions tab, or on a tag.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            build: npm run dist:win
          - os: macos-latest
            build: npm run dist:mac
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build installer
        run: ${{ matrix.build }}
        env:
          # No code-signing certificate — build unsigned installers.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
          if-no-files-found: ignore
