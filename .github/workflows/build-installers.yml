name: Build Installers

# Run manually from the Actions tab, or automatically when you push a version tag.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

# Needed so the release job can create a GitHub Release with the built-in token.
permissions:
  contents: write

jobs:
  macos:
    name: macOS (.dmg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Build macOS installer
        run: npm run dist:mac -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Upload .dmg
        uses: actions/upload-artifact@v4
        with:
          name: CapCut-Subtitle-Editor-macOS
          path: dist/*.dmg
          if-no-files-found: error

  windows:
    name: Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Build Windows installer
        run: npm run dist:win -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Upload .exe
        uses: actions/upload-artifact@v4
        with:
          name: CapCut-Subtitle-Editor-Windows
          path: dist/*.exe
          if-no-files-found: error

  # Publishes the built .dmg and .exe to a GitHub Release → permanent public
  # download links (no login needed). Only runs on version tags (e.g. v1.0.0).
  release:
    name: Publish GitHub Release
    needs: [macos, windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download built installers
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Show files
        run: find artifacts -type f
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          fail_on_unmatched_files: true
          generate_release_notes: true
